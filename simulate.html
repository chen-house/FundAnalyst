<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI产业链配置 · 情景模拟器 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono','SF Mono',monospace;background:#0a0a0f;color:#e2e8f0;padding:24px 16px;min-height:100vh}
.wrap{max-width:900px;margin:0 auto}
h1{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.sub{font-size:11px;color:#64748b;line-height:1.6;margin-bottom:24px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.row label{font-size:11px;color:#94a3b8}
.row input{background:#12121a;border:1px solid #1e1e2e;color:#e2e8f0;padding:6px 12px;border-radius:6px;font-size:14px;font-family:inherit;width:140px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.tab{background:#12121a;border:1px solid #1e1e2e;color:#94a3b8;padding:10px 8px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;text-align:center;transition:all .2s}
.tab:hover{background:#1a1a25}
.tab.active-bull{background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.25);color:#16a34a;font-weight:600}
.tab.active-base{background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.25);color:#2563eb;font-weight:600}
.tab.active-bear{background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.25);color:#d97706;font-weight:600}
.tab.active-stress{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.25);color:#dc2626;font-weight:600}
.tab .t{font-size:13px;margin-bottom:2px}.tab .p{font-size:10px;opacity:.7}
.card{background:#12121a;border:1px solid #1e1e2e;border-radius:10px;padding:16px;margin-bottom:24px}
.card-title{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:12px}
.scenario-box{border-radius:10px;padding:16px;margin-bottom:24px}
.scenario-box .st{font-size:12px;font-weight:600;margin-bottom:8px}
.scenario-box .sd{font-size:11px;color:#94a3b8;margin-bottom:10px;line-height:1.6}
.scenario-box .sa{font-size:10px;color:#64748b;line-height:1.8}
.big-num{text-align:center;padding:20px}
.big-num .label{font-size:11px;color:#64748b;margin-bottom:8px}
.big-num .val{font-size:36px;font-weight:700;letter-spacing:-0.03em}
.big-num .sub2{font-size:14px;margin-top:4px}
.big-num .sub3{font-size:10px;color:#64748b;margin-top:8px}
.green{color:#22c55e}.red{color:#ef4444}
.sector-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sector-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sector-name{font-size:10px;width:110px;color:#94a3b8;flex-shrink:0}
.sector-w{font-size:10px;width:40px;color:#64748b;flex-shrink:0}
.sector-bar{flex:1;height:6px;background:#1a1a25;border-radius:3px;overflow:hidden}
.sector-bar-inner{height:100%;border-radius:3px;transition:width .4s ease}
.sector-val{font-size:11px;font-weight:600;width:55px;text-align:right}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:6px 8px;text-align:left;color:#64748b;font-weight:500;font-size:10px;border-bottom:1px solid #1e1e2e}
td{padding:8px;border-bottom:1px solid rgba(30,30,46,.5)}
.tk{font-weight:600}.tn{color:#64748b;font-weight:400;margin-left:6px;font-size:10px}
.badge{font-size:8px;padding:2px 5px;border-radius:3px;display:inline-block;margin:1px 2px}
.contrib-bar{width:40px;height:4px;background:#1a1a25;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.contrib-bar-inner{height:100%;border-radius:2px}
.compare{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.compare-item{border:1px solid #1e1e2e;border-radius:8px;padding:12px;text-align:center}
.compare-item .cl{font-size:9px;margin-bottom:4px}
.compare-item .cv{font-size:20px;font-weight:700}
.compare-item .cp{font-size:10px;margin-top:2px}
.method{font-size:10px;color:#64748b;line-height:1.8}
.method strong{color:#94a3b8}
.split-detail{font-size:9px;color:#64748b;margin-top:2px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
<h1>AI产业链配置 · 情景模拟器 v2</h1>
<p class="sub">基于六环节框架（算运存封电热）· 跨环节标的已拆分标注 · 标*为建议新增标的</p>

<div class="row">
<label>投入金额 $</label>
<input type="number" id="amtInput" value="100000" onchange="render()">
</div>

<div class="tabs" id="tabs"></div>
<div id="scenarioBox"></div>
<div class="card" id="bigNum"></div>
<div class="card" id="sectorSummary"></div>
<div class="card" id="sectorBreakdown"></div>
<div class="card" id="holdingsTable"></div>
<div class="card" id="compareGrid"></div>
<div class="card method" id="methodology"></div>
</div>

<script>
// ========== 六大环节定义及颜色 ==========
const SECTORS = {
  "算力":   {color:"#a78bfa", label:"算力 (GPU/ASIC)"},
  "运力":   {color:"#3b82f6", label:"运力 (光模块/网络芯片)"},
  "存力":   {color:"#06b6d4", label:"存力 (HBM/DRAM/NAND)"},
  "封测":   {color:"#f59e0b", label:"封测/设备"},
  "电力":   {color:"#10b981", label:"电力 (配电/发电)"},
  "热管理": {color:"#ef4444", label:"热管理 (液冷)"},
  "材料":   {color:"#fbbf24", label:"材料 (PCB/铜箔)"},
};

// ========== 每只标的的环节拆分 ==========
// splits: 该标的总权重在六大环节中的精确拆分
const H=[
{t:"AVGO",n:"Broadcom",w:12,
  splits:[{sec:"算力",pct:5,why:"Google TPU ASIC设计方，XPU市场份额72%"},{sec:"运力",pct:7,why:"Tomahawk交换芯片+CPO光引擎+SerDes"}],
  c:"Anthropic+Google核心",bull:55,base:22,bear:-25,stress:-42},

{t:"MU",n:"Micron",w:10,
  splits:[{sec:"存力",pct:10,why:"HBM3E/HBM4（~50%收入）+DDR5（~30%）+NAND（~20%）"}],
  c:"双链受益",bull:70,base:30,bear:-30,stress:-50},

{t:"MRVL",n:"Marvell",w:7,
  splits:[{sec:"算力",pct:3,why:"Google/Amazon定制ASIC设计，XPU市场份额13%"},{sec:"运力",pct:4,why:"PAM4 DSP、以太网PHY、光模块驱动芯片"}],
  c:"Google ASIC",bull:65,base:25,bear:-35,stress:-48},

{t:"COHR",n:"Coherent",w:7,
  splits:[{sec:"运力",pct:7,why:"800G/1.6T硅光模块+EML激光器核心供应商"}],
  c:"间接受益",bull:80,base:28,bear:-30,stress:-45},

{t:"6857.T",n:"Advantest*",w:6,
  splits:[{sec:"封测",pct:6,why:"ATE半导体测试设备，全球市占率~50%，测试GPU/TPU/HBM"}],
  c:"全链条",bull:60,base:20,bear:-20,stress:-38},

{t:"VRT",n:"Vertiv*",w:6,
  splits:[{sec:"电力",pct:3.5,why:"数据中心UPS/配电/母线槽"},{sec:"热管理",pct:2.5,why:"CDU液冷系统+精密空调，NVIDIA合作伙伴"}],
  c:"基建受益",bull:50,base:18,bear:-15,stress:-30},

{t:"SNDK",n:"Sandisk",w:5,
  splits:[{sec:"存力",pct:5,why:"纯NAND闪存运营商（企业级SSD+消费级）"}],
  c:"间接受益",bull:60,base:15,bear:-40,stress:-55},

{t:"LITE",n:"Lumentum",w:4,
  splits:[{sec:"运力",pct:4,why:"光器件/EML激光器/VCSEL，光模块上游核心元件"}],
  c:"间接受益",bull:70,base:22,bear:-28,stress:-42},

{t:"Kioxia",n:"铠侠",w:4,
  splits:[{sec:"存力",pct:4,why:"全球NAND第二大厂，与SK Hynix联合开发HBF"}],
  c:"间接受益",bull:55,base:12,bear:-35,stress:-50},

{t:"5801",n:"古河電工",w:3,
  splits:[{sec:"运力",pct:3,why:"光纤/光缆制造商，数据中心互联基础设施"}],
  c:"间接受益",bull:40,base:10,bear:-20,stress:-35},

{t:"NOK",n:"Nokia",w:3,
  splits:[{sec:"运力",pct:3,why:"IP路由/光网络设备，数据中心网络非核心供应商"}],
  c:"弱关联",bull:30,base:8,bear:-15,stress:-25},

{t:"5706",n:"三井金属",w:3,
  splits:[{sec:"材料",pct:3,why:"高端电解铜箔，AI服务器高层PCB关键材料"}],
  c:"间接受益",bull:45,base:12,bear:-18,stress:-30},

{t:"3103",n:"ユニチカ",w:2,
  splits:[{sec:"材料",pct:2,why:"超薄低热膨胀玻璃布，半导体封装基板材料"}],
  c:"弱关联",bull:35,base:5,bear:-25,stress:-40},

{t:"INTC",n:"Intel",w:2,
  splits:[{sec:"算力",pct:1,why:"CPU/Gaudi加速器（市占率极低）"},{sec:"封测",pct:1,why:"EMIB先进封装技术，CoWoS替代方案"}],
  c:"弱关联",bull:40,base:5,bear:-30,stress:-45}
];

const S={
bull:{name:"🚀 最佳情景",color:"#16a34a",bg:"rgba(22,163,74,.08)",bd:"rgba(22,163,74,.25)",
desc:"AI Capex持续超预期 + HBM/光模块供给紧张延续至2027 + BOJ渐进加息不引发波动 + 无重大地缘冲击",
a:["超大规模云厂商2026 Capex执行率>95%，2027继续增长20%+","HBM价格维持高位至2027H1，NAND价格持续上行","800G/1.6T光模块需求翻倍，CPO开始商业化放量","日元温和贬值（USD/JPY 155-165），利好日本出口商","BOJ加息至1%但市场有序消化"],
prob:"20-25%",tf:"12个月"},
base:{name:"📊 基准情景",color:"#2563eb",bg:"rgba(37,99,235,.08)",bd:"rgba(37,99,235,.25)",
desc:"AI Capex按指引执行 + 供需紧张但边际缓解 + 地缘风险可控 + BOJ缓慢加息",
a:["超大规模云厂商Capex执行率85-95%，符合市场预期","HBM涨价放缓但不转跌，NAND周期下半年见顶信号","光模块需求强劲但部分产能缓解，ASP温和上行","日元区间震荡（USD/JPY 145-155）","BOJ年内再加息1-2次至1%，市场基本消化"],
prob:"45-50%",tf:"12个月"},
bear:{name:"⚠️ 不利情景",color:"#d97706",bg:"rgba(217,119,6,.08)",bd:"rgba(217,119,6,.25)",
desc:"AI Capex增速放缓 + 供需提前转松 + 周期见顶信号明确",
a:["部分云厂商下调Capex指引10-15%","HBM供给2027年快速释放，价格开始转跌","NAND率先进入下行周期，SNDK/Kioxia利润承压","AI估值泡沫论升温，半导体整体回调20-35%","日元升值至140以下，部分Carry Trade有序平仓"],
prob:"20-25%",tf:"12个月"},
stress:{name:"💥 极端压力",color:"#dc2626",bg:"rgba(220,38,38,.08)",bd:"rgba(220,38,38,.25)",
desc:"Carry Trade爆仓 + AI泡沫破裂 + 地缘冲击三重叠加",
a:["BOJ意外大幅加息或日债危机→日元暴涨至120-130","Carry Trade集中平仓，全球风险资产遭抛售","AI投资ROI被严重质疑（类似2000年互联网泡沫）","台海/中东重大地缘冲击导致供应链中断","半导体板块整体回撤40-55%","历史表明此类冲击通常3-6个月内大幅收复"],
prob:"5-10%",tf:"3-6个月冲击+6-12月恢复"}
};

let cur="base";

function calcReturn(scenario){
  let total=0;
  const details=H.map(h=>{
    const r=h[scenario];
    const contrib=(h.w/100)*r;
    total+=contrib;
    return{...h,ret:r,contrib};
  });
  return{details,total};
}

function calcSectorAgg(scenario){
  const map={};
  H.forEach(h=>{
    const r=h[scenario];
    h.splits.forEach(sp=>{
      if(!map[sp.sec]) map[sp.sec]={w:0,c:0};
      map[sp.sec].w += sp.pct;
      // contribution is proportional: (sp.pct / h.w) * (h.w/100) * r = sp.pct/100 * r
      map[sp.sec].c += (sp.pct/100)*r;
    });
  });
  return Object.entries(map).map(([n,v])=>({n,...v})).sort((a,b)=>b.c-a.c);
}

function getAmt(){return Number(document.getElementById("amtInput").value)||100000}

function render(){
  const amt=getAmt();
  const s=S[cur];
  const res=calcReturn(cur);

  // Tabs
  let tabsHtml="";
  for(const[k,v]of Object.entries(S)){
    const cls=k===cur?"active-"+k:"";
    tabsHtml+=`<button class="tab ${cls}" onclick="cur='${k}';render()"><div class="t">${v.name}</div><div class="p">概率 ${v.prob}</div></button>`;
  }
  document.getElementById("tabs").innerHTML=tabsHtml;

  // Scenario box
  document.getElementById("scenarioBox").innerHTML=`
    <div class="scenario-box" style="background:${s.bg};border:1px solid ${s.bd}">
      <div class="st" style="color:${s.color}">${s.name} · ${s.tf}</div>
      <div class="sd">${s.desc}</div>
      <div class="sa">${s.a.map(x=>"• "+x).join("<br>")}</div>
    </div>`;

  // Big number
  const pnl=amt*(res.total/100);
  const cls=res.total>=0?"green":"red";
  document.getElementById("bigNum").innerHTML=`
    <div class="big-num">
      <div class="label">组合加权预期回报</div>
      <div class="val ${cls}">${res.total>=0?"+":""}${res.total.toFixed(1)}%</div>
      <div class="sub2 ${cls}">${pnl>=0?"+":""}$${Math.round(pnl).toLocaleString()}</div>
      <div class="sub3">$${amt.toLocaleString()} → $${Math.round(amt+pnl).toLocaleString()}</div>
    </div>`;

  // ========== 六大环节汇总（精确拆分后） ==========
  const sectors=calcSectorAgg(cur);
  const totalW=sectors.reduce((a,s)=>a+s.w,0);
  let sumHtml=`<div class="card-title">六大环节汇总（跨环节标的已精确拆分）</div>`;
  sumHtml+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px">`;
  sectors.forEach(sec=>{
    const info=SECTORS[sec.n]||{color:"#64748b",label:sec.n};
    const vcls=sec.c>=0?"green":"red";
    sumHtml+=`<div style="background:${info.color}11;border:1px solid ${info.color}33;border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:9px;color:${info.color};margin-bottom:4px">${info.label}</div>
      <div style="font-size:18px;font-weight:700;color:${info.color}">${sec.w.toFixed(1)}%</div>
      <div style="font-size:10px;margin-top:2px" class="${vcls}">贡献 ${sec.c>=0?"+":""}${sec.c.toFixed(1)}%</div>
    </div>`;
  });
  sumHtml+=`</div>`;
  sumHtml+=`<div style="font-size:9px;color:#64748b;text-align:right">权重合计 ${totalW.toFixed(1)}% · 剩余为现金/弹药</div>`;
  document.getElementById("sectorSummary").innerHTML=sumHtml;

  // ========== 环节贡献条形图 ==========
  const maxSC=Math.max(...sectors.map(x=>Math.abs(x.c)),0.1);
  let secHtml=`<div class="card-title">环节贡献拆解</div>`;
  sectors.forEach(sec=>{
    const info=SECTORS[sec.n]||{color:"#64748b"};
    const barW=Math.min(Math.abs(sec.c)/maxSC*100,100);
    const barColor=sec.c>=0?info.color:"#ef4444";
    const valCls=sec.c>=0?"green":"red";
    // find which holdings contribute to this sector
    const contributors=[];
    H.forEach(h=>{
      h.splits.forEach(sp=>{
        if(sp.sec===sec.n) contributors.push(`${h.t} ${sp.pct}%`);
      });
    });
    secHtml+=`<div class="sector-row">
      <div class="sector-dot" style="background:${info.color}"></div>
      <div class="sector-name">${sec.n}</div>
      <div class="sector-w">${sec.w.toFixed(1)}%</div>
      <div class="sector-bar"><div class="sector-bar-inner" style="width:${barW}%;background:${barColor}"></div></div>
      <div class="sector-val ${valCls}">${sec.c>=0?"+":""}${sec.c.toFixed(1)}%</div>
    </div>
    <div style="margin-left:20px;margin-bottom:8px;font-size:9px;color:#475569">
      ↳ ${contributors.join(" · ")}
    </div>`;
  });
  document.getElementById("sectorBreakdown").innerHTML=secHtml;

  // ========== 个股明细 ==========
  const sorted=[...res.details].sort((a,b)=>b.contrib-a.contrib);
  const maxC=Math.max(...sorted.map(x=>Math.abs(x.contrib)),0.1);
  let tHtml=`<div class="card-title">个股明细（按贡献排序 · 环节拆分已标注）</div><table><thead><tr>
    <th>标的</th><th>环节拆分</th><th>总权重</th><th>预期回报</th><th>贡献</th><th>盈亏</th></tr></thead><tbody>`;
  sorted.forEach(d=>{
    const rCls=d.ret>=0?"green":"red";
    const cCls=d.contrib>=0?"green":"red";
    const barW=(Math.abs(d.contrib)/maxC)*100;
    const pnlVal=amt*(d.w/100)*(d.ret/100);
    const pCls=pnlVal>=0?"green":"red";

    // Build split badges
    let splitHtml="";
    d.splits.forEach(sp=>{
      const info=SECTORS[sp.sec]||{color:"#64748b"};
      splitHtml+=`<span class="badge" style="background:${info.color}22;color:${info.color}">${sp.sec} ${sp.pct}%</span>`;
    });
    // Add why tooltips
    let whyHtml=`<div class="split-detail">`;
    d.splits.forEach(sp=>{
      whyHtml+=`↳ ${sp.sec} ${sp.pct}%：${sp.why}<br>`;
    });
    whyHtml+=`</div>`;

    tHtml+=`<tr>
      <td><span class="tk">${d.t}</span><span class="tn">${d.n}</span></td>
      <td>${splitHtml}${whyHtml}</td>
      <td style="color:#94a3b8;font-weight:600">${d.w}%</td>
      <td class="${rCls}" style="font-weight:600">${d.ret>=0?"+":""}${d.ret}%</td>
      <td><span class="contrib-bar"><span class="contrib-bar-inner" style="width:${barW}%;background:${d.contrib>=0?"#22c55e":"#ef4444"}"></span></span><span class="${cCls}" style="font-weight:500">${d.contrib>=0?"+":""}${d.contrib.toFixed(2)}%</span></td>
      <td class="${pCls}" style="font-weight:500">${pnlVal>=0?"+":""}$${Math.round(pnlVal).toLocaleString()}</td>
    </tr>`;
  });
  tHtml+=`</tbody></table>`;
  document.getElementById("holdingsTable").innerHTML=tHtml;

  // Compare grid
  let cmpHtml=`<div class="card-title">四情景收益对比</div><div class="compare">`;
  for(const[k,v]of Object.entries(S)){
    const r=calcReturn(k);
    const p=amt*(r.total/100);
    const vc=r.total>=0?"green":"red";
    const pc=p>=0?"rgba(34,197,94,.7)":"rgba(239,68,68,.7)";
    const border=k===cur?`border-color:${v.bd};background:${v.bg}`:"";
    cmpHtml+=`<div class="compare-item" style="${border}">
      <div class="cl" style="color:${v.color}">${v.name}</div>
      <div class="cv ${vc}">${r.total>=0?"+":""}${r.total.toFixed(1)}%</div>
      <div class="cp" style="color:${pc}">${p>=0?"+":""}$${Math.round(p).toLocaleString()}</div>
    </div>`;
  }
  cmpHtml+=`</div>`;
  document.getElementById("compareGrid").innerHTML=cmpHtml;

  // Methodology
  document.getElementById("methodology").innerHTML=`
    <div class="card-title">模拟方法论与局限性说明</div>
    <p>• <strong>环节拆分逻辑：</strong>跨环节标的（如AVGO=算力5%+运力7%）的拆分比例基于该公司各业务线的营收占比和战略权重</p>
    <p>• AVGO：ASIC/XPU业务约占AI相关收入的~42%→算力5%，网络芯片(Tomahawk)+CPO约占~58%→运力7%</p>
    <p>• MRVL：定制ASIC约占AI收入的~43%→算力3%，网络DSP/PHY约占~57%→运力4%</p>
    <p>• VRT：配电/UPS约占收入的~58%→电力3.5%，热管理/液冷约占~42%→热管理2.5%</p>
    <p>• INTC：CPU/加速器→算力1%，EMIB封装服务→封测1%</p>
    <p style="margin-top:8px">• 概率加权期望回报 ≈ 最佳×22.5% + 基准×47.5% + 不利×22.5% + 极端×7.5% ≈ <strong style="color:#22c55e">+12%至+15%</strong></p>
    <p style="margin-top:4px"><strong>核心局限：</strong>静态情景分析，不考虑路径依赖、相关性变化、再平衡、汇率对冲成本和税费。不构成投资建议。</p>`;
